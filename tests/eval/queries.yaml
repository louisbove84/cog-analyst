# Gold retrieval set for RAG eval (NOT a pytest unit test).
#
# Run it with:  python tests/eval/eval_rag_retrieval.py
#
# WHAT MAKES A CASE VALID
#   A case is meaningful only if its `expected` pages GENUINELY answer the
#   `query`. Every expected page carries a `quote`: the exact text on that page
#   that makes it relevant. The runner re-checks each quote against the stored
#   page text on every run, so a typo'd or moved quote is caught automatically.
#
# FIELDS
#   id        label only (used by --only and the summary); not scored.
#   query     the analyst question that gets embedded and run against the corpus.
#   expected  the answer key: pages that should be retrieved, each with a `quote`.
#   verified  true once the quote was confirmed against the actual page text.
#   note      what "relevant" means here / caveats.
#
# PAGE NUMBERS are PDF page indices (PyMuPDF, 1-based) — the same number in the
# `file p.N` citation, NOT the printed page number.
#
# Coverage target: >=3 cases per source document and >=4 per query type
# (entity/designator, location/theater, doctrine/concept, capability/role).

# ---------------------------------------------------------------------------
# Strike / missiles (entity + capability)
# ---------------------------------------------------------------------------
- id: rocket_force_taiwan
  query: "PLA Rocket Force ballistic missiles targeting Taiwan"
  expected:
    - source: ANNUAL-REPORT-TO-CONGRESS-MILITARY-AND-SECURITY-DEVELOPMENTS-INVOLVING-THE-PEOPLES-REPUBLIC-OF-CHINA-2025.pdf
      page: 89
      quote: "The Eastern Theater Command is responsible for operations in the East China Sea and against Taiwan. Much of China's conventional missile firepower is also based within"
    - source: China_Military_Power_2019.pdf
      page: 101
      quote: "APPENDIX D: PLA Rocket Force"
  verified: true
  note: "PLARF conventional missile firepower oriented at Taiwan (Eastern Theater) + Rocket Force appendix."

- id: df26_guam_missile
